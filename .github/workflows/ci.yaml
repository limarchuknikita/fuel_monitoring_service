name: CI

on:
    push:
        branches: [master]
    pull_request:
    workflow_dispatch:
permissions:
    contents: read

jobs:
    format-lint-unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Check formatting
              run: cargo fmt --all -- --check
            - name: Lint code
              run: cargo clippy --all-targets --all-features -- -D warnings
            - name: Run tests
              run: cargo test --lib
    integration-tests-vessels-1:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_1
              run: cargo test ---test vessels_test_1
    integration-tests-vessels-2:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_2
              run: cargo test ---test vessels_test_2
    integration-tests-vessels-3:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_3
              run: cargo test ---test vessels_test_3
    integration-tests-vessels-4:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_4
              run: cargo test ---test vessels_test_4
    integration-tests-vessels-5:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_5
              run: cargo test ---test vessels_test_5
    build:
        runs-on: ubuntu-latest
        needs: [format-lint-unit-tests, integration-tests-vessels-1, integration-tests-vessels-2, integration-tests-vessels-3, integration-tests-vessels-4, integration-tests-vessels-5]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Build project
              run: cargo build --release