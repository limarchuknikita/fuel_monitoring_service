apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fuel-monitoring-ingress
  namespace: fuel-monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: fuel-monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fuel-monitoring-service
                port:
                  number: 3000