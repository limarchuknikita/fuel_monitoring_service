name: CI

on:
    pull_request:
        branches: [master]
    workflow_dispatch:
permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    format-lint-unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Check formatting
              run: cargo fmt --all -- --check
            - name: Lint code
              run: cargo clippy --all-targets --all-features -- -D warnings
            - name: Run tests
              run: cargo test --lib
    integration-tests-vessels-1:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_1
              run: cargo test --test vessels_test_1
    integration-tests-vessels-2:
        runs-on: ubuntu-latest
        needs: format-lint-unit-tests
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Run integration tests for vessels_test_2
              run: cargo test --test vessels_test_2

    build:
        runs-on: ubuntu-latest
        needs: [format-lint-unit-tests, integration-tests-vessels-1, integration-tests-vessels-2]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
            - name: Build project
              run: cargo build --release
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: fuel_monitoring_service_binary-${{ github.sha }}
                path: target/release/fuel_monitoring_service
                retention-days: 1
