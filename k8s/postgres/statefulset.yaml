apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fuel-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:13
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: fuel-monitoring-secret