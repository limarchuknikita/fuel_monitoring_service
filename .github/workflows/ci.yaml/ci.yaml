name: CI

on:
    push:
        branches: [master]
    pull_request:
    workflow_dispatch:
permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Show branch and commit
              run: |
                echo "Branch: ${{ github.ref }}"
                echo "Commit: ${{ github.sha }}"
            - name: Lint placeholder
              run: echo "Linting code..."